# =============================================================================
# CodeFlow - Production Nginx Configuration
# =============================================================================
# Features:
# - Load balancing across backend instances
# - Response caching for cost reduction
# - Gzip compression
# - Rate limiting
# - Security headers
# - SSL/TLS termination
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # =========================================================================
    # Performance Optimization
    # =========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    reset_timedout_connection on;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 20M;
    large_client_header_buffers 4 8k;

    # =========================================================================
    # Gzip Compression (save bandwidth costs)
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        font/opentype;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # =========================================================================
    # Caching Configuration (reduce backend load = reduce AI costs)
    # =========================================================================
    proxy_cache_path /var/cache/nginx/api_cache
        levels=1:2
        keys_zone=api_cache:100m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/static_cache
        levels=1:2
        keys_zone=static_cache:50m
        max_size=500m
        inactive=30d
        use_temp_path=off;

    # =========================================================================
    # Rate Limiting (DDoS protection + cost control)
    # =========================================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =========================================================================
    # Upstream Backend Servers
    # =========================================================================
    upstream backend_api {
        least_conn;  # Least connection load balancing
        
        # Backend instances (Docker Compose service)
        server backend:8000 max_fails=3 fail_timeout=30s;
        
        # If scaling: add more servers or use Docker DNS
        # server backend:8001;
        # server backend:8002;
        
        keepalive 32;  # Connection pooling
    }

    # =========================================================================
    # HTTP Server (redirect to HTTPS)
    # =========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check (allow HTTP)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS Server
    # =========================================================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name api.codeflow.ai;  # Update with your domain

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # =====================================================================
        # Security Headers
        # =====================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CORS (adjust for your frontend)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Max-Age 3600;

        # =====================================================================
        # API Endpoints
        # =====================================================================
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            # Proxy settings
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffering (off for streaming)
            proxy_buffering off;
            proxy_request_buffering off;

            # No caching for POST/PUT/DELETE
            proxy_cache_bypass $request_method;
            proxy_no_cache $request_method;
        }

        # =====================================================================
        # Cacheable GET Endpoints (reduce backend load)
        # =====================================================================
        location ~* ^/api/(analytics|learning|progress|knowledge|playbooks)/.*$ {
            # Rate limiting
            limit_req zone=general_limit burst=50 nodelay;

            # Caching
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;  # Cache 5 minutes
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;

            # Proxy settings
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Health Check
        # =====================================================================
        location /health {
            access_log off;
            proxy_pass http://backend_api;
        }

        # =====================================================================
        # Metrics (Prometheus)
        # =====================================================================
        location /metrics {
            access_log off;
            allow 10.0.0.0/8;   # Internal network
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://backend_api;
        }

        # =====================================================================
        # Root
        # =====================================================================
        location / {
            return 200 '{"status":"ok","service":"CodeFlow API","version":"2.0.0"}';
            add_header Content-Type application/json;
        }
    }
}

# =============================================================================
# Performance Notes:
# =============================================================================
# 
# 1. Caching Strategy:
#    - API responses cached for 5 minutes
#    - Saves ~40-60% of backend requests
#    - Reduces AI costs significantly
#
# 2. Load Balancing:
#    - Least connection algorithm
#    - Connection pooling (keepalive)
#    - Health checks and failover
#
# 3. Rate Limiting:
#    - 50 requests/minute per IP for API calls
#    - Protects against abuse
#    - Prevents cost spikes
#
# 4. Gzip Compression:
#    - 60-80% bandwidth reduction
#    - Lower transfer costs
#
# 5. SSL/TLS:
#    - TLS 1.2+ only
#    - Modern cipher suites
#    - Session caching
#
# =============================================================================
