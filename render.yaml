services:
  # 1. Main FastAPI Backend
  - type: web
    name: codeflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codeflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: codeflow-redis
          type: redis
          property: connectionString
      # Required Secrets / Custom Configs (User must fill in Render Dashboard)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@codeflow.dev
      - key: ADMIN_EMAIL
        sync: false

  # 3. Redis Instance
  - type: redis
    name: codeflow-redis
    plan: free
    ipAllowList: []

databases:
  # 4. PostgreSQL Database
  - name: codeflow-db
    databaseName: codeflow
    user: codeflow
    plan: free
