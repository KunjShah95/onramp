name: Rotate internal secrets

on:
  schedule:
    - cron: "0 9 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      target:
        description: "Secret(s) to rotate"
        required: true
        default: all-internal
        type: choice
        options:
          - enc-key
          - hmac-secret
          - all-internal

permissions:
  contents: write
  pull-requests: write

jobs:
  rotate:
    name: Generate new secrets
    runs-on: ubuntu-latest

    outputs:
      enc-key: ${{ steps.gen-enc.outputs.value }}
      hmac-secret: ${{ steps.gen-hmac.outputs.value }}
      branch: ${{ steps.create-branch.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cryptography
        run: pip install cryptography

      - name: Generate Fernet key
        id: gen-enc
        run: |
          KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "value=$KEY" >> "$GITHUB_OUTPUT"

      - name: Generate HMAC secret
        id: gen-hmac
        run: |
          SECRET=$(python3 -c "import secrets; print(secrets.token_hex(32))")
          echo "value=$SECRET" >> "$GITHUB_OUTPUT"

      - name: Create rotation branch
        id: create-branch
        run: |
          DATE=$(date +%Y%m%d)
          BRANCH="chore/rotate-secrets-$DATE"
          git config user.name "codeflow-ops-bot"
          git config user.email "ops-bot@codeflow.dev"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Update .env.example
        run: |
          sed -i "s/^GITHUB_TOKEN_ENCRYPTION_KEY=.*/GITHUB_TOKEN_ENCRYPTION_KEY=/" backend/.env.example
          sed -i "s/^#\?API_KEY_HMAC_SECRET=.*/API_KEY_HMAC_SECRET=/" backend/.env.example

      - name: Commit and push
        run: |
          git add backend/.env.example
          if ! git diff --staged --quiet; then
            git commit -m "chore: rotate internal secrets ($(date +%Y-%m-%d))"
            git push origin "${{ steps.create-branch.outputs.branch }}"
          fi

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.create-branch.outputs.branch }}" \
            --title "chore: rotate internal secrets ($(date +%Y-%m-%d))" \
            --body "New secrets have been generated. View the workflow run for values."
