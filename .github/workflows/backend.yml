name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: onramp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.lock.txt"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.lock.txt
          pip install pytest pytest-asyncio pytest-timeout httpx

      - name: Check code compiles
        run: python -m compileall backend/app

      - name: Create .env and run migrations
        run: |
          grep -v '^\[TEMPLATE\]' backend/.env.example > backend/.env 2>/dev/null || cp backend/.env.example backend/.env
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/onramp_test" >> backend/.env
          cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/onramp_test

      - name: Run tests (memory backend)
        run: |
          cd backend && python -m pytest tests/ -v --timeout=30
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/onramp_test
          ENV: test
          STORAGE_BACKEND: memory
          GROQ_API_KEY: sk-test-placeholder
          PII_ENCRYPTION_KEY: Yk9yLVlpN1RaMkVTSnRiV3hBZ01GdWpGS2U0dUdnMkU=

      - name: Run tests (PostgreSQL backend)
        run: |
          cd backend && python -m pytest tests/test_task_service.py tests/test_notification_service.py tests/test_gamification.py -v --timeout=60 --run-postgres
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/onramp_test
          ENV: test
          STORAGE_BACKEND: postgres
          GROQ_API_KEY: sk-test-placeholder
          PII_ENCRYPTION_KEY: Yk9yLVlpN1RaMkVTSnRiV3hBZ01GdWpGS2U0dUdnMkU=
