name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run linter (3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          pip install ruff
          ruff check backend/

      - name: Run type checker (3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          pip install pyright
          npx pyright backend/

      - name: Run parser unit tests
        run: |
          cd backend && python -m pytest tests/test_parser_service.py tests/test_architecture_explorer.py -v

      - name: Run multi-language parser integration test
        run: |
          cd backend && PYTHONPATH=. python tests/integration_multi_lang.py

      - name: Run parser benchmark (3.11 only, non-blocking)
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: |
          cd backend && PYTHONPATH=. python tests/benchmark_parser.py --json benchmark_results.json --baseline tests/.parser_benchmark_baseline.json --real-dir ../backend/app --real-dir ../web/src

      - name: Run all tests
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=xml

      - name: Upload coverage (3.11 only)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} --zone=${{ secrets.GKE_ZONE }} --project=${{ secrets.GCP_PROJECT }}
          kubectl apply -f kubernetes/
          kubectl set image deployment/codeflow-backend backend=${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }} -n codeflow
          kubectl set image deployment/codeflow-celery-worker celery-worker=${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }} -n codeflow

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Deploy to GKE Production
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_PROD }} --zone=${{ secrets.GKE_ZONE_PROD }} --project=${{ secrets.GCP_PROJECT_PROD }}
          kubectl set image deployment/codeflow-backend backend=${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }} -n codeflow-prod
          kubectl set image deployment/codeflow-celery-worker celery-worker=${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }} -n codeflow-prod
