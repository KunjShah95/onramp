apiVersion: v1
kind: ConfigMap
metadata:
  name: codeflow-config
  labels:
    app: codeflow
data:
  ENVIRONMENT: "production"
  ENV: "production"
  LOG_LEVEL: "INFO"
  REDIS_HOST: "codeflow-redis"
  REDIS_PORT: "6379"
  DB_SSL_MODE: "require"
  CORS_ORIGINS: "https://codeflow.app"
  LLM_PROVIDER: "openrouter"
---
apiVersion: v1
kind: Secret
metadata:
  name: codeflow-secrets
  labels:
    app: codeflow
type: Opaque
stringData:
  REDIS_PASSWORD: ""
  DB_PASSWORD: ""
  DATABASE_URL: ""
  OPENROUTER_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GROQ_API_KEY: ""
  NEON_AUTH_URL: ""
  AUTH_DB_URL: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  SENDGRID_API_KEY: ""
  JWT_SECRET_KEY: ""
  API_KEY_ENCRYPTION_KEY: ""
  SENTRY_DSN: ""
