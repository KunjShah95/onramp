apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeflow-frontend
  labels:
    app: codeflow
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codeflow
      tier: frontend
  template:
    metadata:
      labels:
        app: codeflow
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: codeflow/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: codeflow
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
