apiVersion: apps/v1
kind: Deployment
metadata:
  name: onramp-backend
  labels:
    app: onramp
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onramp
      tier: backend
  template:
    metadata:
      labels:
        app: onramp
        tier: backend
    spec:
      containers:
        - name: backend
          image: onramp/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: onramp-secrets
            - configMapRef:
                name: onramp-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/observability/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/observability/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onramp-celery-worker
  labels:
    app: onramp
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onramp
      tier: worker
  template:
    metadata:
      labels:
        app: onramp
        tier: worker
    spec:
      containers:
        - name: celery-worker
          image: onramp/backend:latest
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info", "-Q", "agent-tasks,analytics-tasks,notification-tasks,default"]
          envFrom:
            - secretRef:
                name: onramp-secrets
            - configMapRef:
                name: onramp-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "3000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onramp-celery-beat
  labels:
    app: onramp
    tier: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onramp
      tier: scheduler
  template:
    metadata:
      labels:
        app: onramp
        tier: scheduler
    spec:
      containers:
        - name: celery-beat
          image: onramp/backend:latest
          command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]
          envFrom:
            - secretRef:
                name: onramp-secrets
            - configMapRef:
                name: onramp-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
