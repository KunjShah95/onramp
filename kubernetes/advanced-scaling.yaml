apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codeflow-backend-advanced
  labels:
    app: codeflow
    component: backend
    scaling: advanced
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codeflow-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: 100
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codeflow-backend-pdb
  labels:
    app: codeflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: codeflow
      component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codeflow-frontend-pdb
  labels:
    app: codeflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: codeflow
      component: frontend
