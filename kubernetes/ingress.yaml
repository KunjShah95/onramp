apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeflow-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
    - hosts:
        - api.codeflow.ai
        - app.codeflow.ai
      secretName: codeflow-tls
  rules:
    - host: api.codeflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codeflow-backend-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeflow-frontend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - app.codeflow.ai
      secretName: codeflow-frontend-tls
  rules:
    - host: app.codeflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
