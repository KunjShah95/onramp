# docker compose v2
services:
  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onramp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
      POSTGRES_DB: onramp
    ports:
      - "5433:5432"   # host:5433 → container:5432 (avoids conflict with local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onramp -d onramp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8001:8000"   # host:8001 → container:8000 (avoids conflict with local server)
    environment:
      - ENVIRONMENT=development
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-test-project}
      - GOOGLE_CLOUD_LOCATION=us-central1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - DATABASE_URL=postgresql+asyncpg://onramp:${DB_PASSWORD:-postgres_password}@postgres:5432/onramp
      - DB_SSL_MODE=disable
      - GEMINI_API_KEY=${GEMINI_API_KEY:-test-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-test-secret-key-min-32-chars}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY:-test-encryption-key-32-chars}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80,http://localhost:3000
      - LOG_LEVEL=DEBUG
      - ENV=${ENV:-development}
    volumes:
      - ./backend:/app
      - ./backend/requirements.txt:/app/requirements.txt
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    ports:
      - "8080:80"   # host:8080 → container:80 (avoids conflict with local web server)
    depends_on:
      backend:
        condition: service_started
    # API calls from the browser go through Nginx at port 80 (same-origin via /api/* proxy)
    # or directly to http://localhost:8000 if VITE_API_URL is absolute.

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment: &celery_env
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - DATABASE_URL=postgresql+asyncpg://onramp:${DB_PASSWORD:-postgres_password}@postgres:5432/onramp
      - DB_SSL_MODE=disable
      - GEMINI_API_KEY=${GEMINI_API_KEY:-test-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-test-secret-key-min-32-chars}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY:-test-encryption-key-32-chars}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker -l info -Q agent-tasks,analytics-tasks,notification-tasks,default
    profiles:
      - worker

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment:
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - DATABASE_URL=postgresql+asyncpg://onramp:${DB_PASSWORD:-postgres_password}@postgres:5432/onramp
      - DB_SSL_MODE=disable
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat -l info
    profiles:
      - worker
volumes:
  redis_data:
  postgres_data:
